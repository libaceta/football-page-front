name: CI / Deploy to S3 + CloudFront

# Despliegue del front estático (Angular) a S3, servido por CloudFront en el
# subdominio mundial.pampa-net.com (base-href /). El deploy NO provisiona infra:
# el bucket, la distribución, el cert ACM y el record DNS se crean una vez aparte.
#
# Config requerida en el repo (Settings -> Secrets and variables -> Actions):
#   Variables:
#     AWS_REGION                 ej. us-east-1
#     AWS_ROLE_ARN               role IAM que asume GitHub vía OIDC
#     S3_BUCKET                  bucket del sitio (sin s3://)
#     CLOUDFRONT_DISTRIBUTION_ID id de la distribución
#
# La distribución debe mapear errores 403/404 -> /index.html (200) para que el
# routing SPA de Angular funcione con deep-links.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ── Build ───────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Servido en la raíz del subdominio -> base-href /.
      - name: Build
        run: npx ng build --configuration production --base-href /

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/football-page/browser
          if-no-files-found: error
          retention-days: 1

  # ── Deploy ──────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    # Evita despliegues solapados pisándose entre sí.
    concurrency:
      group: deploy-front
      cancel-in-progress: true

    # OIDC: id-token para asumir el role IAM sin claves largas.
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: browser

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      # 1) Assets con hash en el nombre (immutable) -> cache larga. Se excluye
      #    index.html y los source maps. --delete limpia archivos viejos.
      - name: Sync hashed assets to S3
        run: |
          aws s3 sync browser/ "s3://${{ vars.S3_BUCKET }}/" \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html" \
            --exclude "*.map"

      # 2) index.html sin cache (es el único path estable; debe revalidar siempre).
      - name: Upload index.html (no-cache)
        run: |
          aws s3 cp browser/index.html "s3://${{ vars.S3_BUCKET }}/index.html" \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "text/html"

      # 3) Invalidar solo index.html y la raíz: los assets nuevos tienen nombre
      #    nuevo (no necesitan invalidación). Mantiene el costo de invalidaciones
      #    dentro de la capa gratis.
      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/" "/index.html"

      - name: Done
        run: echo "✓ Deploy a s3://${{ vars.S3_BUCKET }} + invalidación CloudFront"
